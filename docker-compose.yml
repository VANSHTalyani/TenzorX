services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loanwizard
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan -d loanwizard"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    environment:
      APP_ENV: development
      POSTGRES_DSN: postgresql+asyncpg://loan:loan@postgres:5432/loanwizard
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b-instruct
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: loan-wizard-recordings
      MINIO_SECURE: "false"
      WHISPER_MODEL_SIZE: base
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      STT_MAX_CONCURRENT: "4"
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
      - whisper_cache:/root/.cache
      - models_data:/app/data/models
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  whisper_cache:
  models_data:
